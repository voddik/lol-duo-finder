<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoL Duo Finder - Canlı Lobiler</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <header>
        <div class="logo">LoL<span class="red">Duo</span></div>
        <div class="user-panel">
            <input type="text" id="usernameInput" placeholder="Riot Nickname girin..." value="Oyuncu_">
            <button class="riot-btn">Aktif Ol</button>
        </div>
    </header>

    <main>
        <section class="create-lobby-section">
            <h3>🎮 Canlı Oda (Lobi) Kur</h3>
            <div class="lobby-form">
                <select id="gameType">
                    <option value="Dereceli Solo/Duo">Dereceli Solo/Duo</option>
                    <option value="Dereceli Esnek">Dereceli Esnek</option>
                    <option value="Normal Seçimlik">Normal Seçimlik</option>
                    <option value="ARAM">ARAM</option>
                </select>
                <select id="targetRank">
                    <option value="Tüm Ligler">Her Lig</option>
                    <option value="Gold">Gold</option>
                    <option value="Platinum">Platinum</option>
                    <option value="Diamond">Diamond</option>
                    <option value="Master+">Master+</option>
                </select>
                <select id="targetRole">
                    <option value="Tüm Roller">Her Rol</option>
                    <option value="Top">Top</option>
                    <option value="Jungle">Jungle</option>
                    <option value="Mid">Mid</option>
                    <option value="ADC">ADC</option>
                    <option value="Support">Support</option>
                </select>
                <button id="createLobbyBtn" class="primary-btn">Lobi Oluştur</button>
            </div>
        </section>

        <section class="lobbies-section">
            <h2>🔴 Aktif Odalar / Lobiler</h2>
            <div id="lobbiesContainer" class="lobbies-grid">
                <p style="color: #888;">Henüz aktif oda yok, ilk odayı sen kur!</p>
            </div>
        </section>
    </main>

    <div id="inviteNotification" class="notification hidden">
        <p id="inviteText"></p>
        <button id="acceptInviteBtn">Katıl</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
